<html>
    <head>
        <title>Feedback Form</title>
        <link href="style.css" rel="stylesheet" type="text/css">
    </head>
    <head>
        <nav>
            <a href="index.html">Index Form</a>
            <a href="semantic.html">Semantic Form</a>
            <a href="video.html">Video</a>
        </nav>
        <div id="wrapper">
            <h1>Feedback .... Stay in touch</h1>
            <form 
            action="mailto:rami.shafik@ontariotechu.net?subject=Feedback on website"
            enctype="text/plain"
            method="post"
            name="Form">
            <p>
                <lable for="Fname">First Name :</lable>
                <input type="text" name="name" size="40" 
                placeholder="Enter your first name" required>
            </p>
            <p>
                <lable for="Lname">Last Name :</lable>
                <input type="text" name="name" size="40" 
                placeholder="Enter your last name" required>
            </p>
            <p>
                <lable for="email">Email :</lable>
                <input type="email" name="email" size="40" 
                placeholder="Enter your email" required>
            </p>
            <p>
                <label for="feedback">Comments :</label>
                <textarea name="feedback" cols="60" rows="8"></textarea>
            </p>
            <p>
                <input type="checkbox">
                <label for="maillist">Put me on your e-list</label>
            </p>
            <p>
                <label for="where">How did you find us?</label>
                <select name="where">
                    <option value="Search engine">Seach engine</option>
                    <option value="Word of mouth"> Word of mouth</option>
                    <option value="Social Media"> Social Media</option>
                    <option value="Other"> Other</option>
                </select>
            </p>
            <p>
                <label for="countries">Where do you live?</label>
                <input list="countries">
                <datalist id="countries">
                    <option value="Afghanistan">
                    <option value="Albania">
                    <option value="Algeria">
                    <option value="Andorra">
                    <option value="Angola">
                    <option value="Antigua and Barbuda">
                    <option value="Argentina">
                    <option value="Armenia">
                    <option value="Aruba">
                    <option value="Australia">
                    <option value="Austria">
                    <option value="Azerbaijan">
                </datalist>
            </p>
            <br>
            <input type="reset" value="Reset">
            <input type="submit" value="Submit">
            </form>
            <h3>Captcha</h3>
            <form oninput="x.value = parseInt(a.value) + parseInt(b.value)">
                <input type="number" id="a"> + <input type="number" id="b">
                <output name="x" for="a b"></output>
            </form>
        </div>
    </head>
</html>
