<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of DOM</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>
    <h1>DOM Basic Example</h1>
    <div id="content">
        <p>This is some static content on the page.</p>
        <p id="dynamic-content">
            This is the dynamic content that can change
        </p>
    </div>
    <button class="btn" id="changeTextButton">Change Text</button>
    <button class="btn" id="changeStyleButton">Change Style</button>
    <button class="btn" id="createElementButton">
        Create New Element</button>
    <button class="btn" id="toggleVisibilityButton">
        Toggle Content Visiblity</button>
    <div class="container">
        <div id="new-element">
            This will appear when new element is created
        </div>
    </div>
</body>
</html>
