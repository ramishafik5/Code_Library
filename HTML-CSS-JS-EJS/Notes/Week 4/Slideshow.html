<!--Transform (scale,translate,rotate,skew) -> Animation -> Slideshow -->
<!--0 then do something, 1 then do something else-->
<!--hover, active, visited-->
<!DOCTYPE html>
<html>
<head>
        <title>Quiz</title>
        <style>
            input + label {color: red;}
            input:hover + label{color: green;}
            input:checked + label {color: black;}
        </style>
</head>
<body>
    <input type="checkbox" name="selected">
    <label for="selected">Click to select</label>
</body>
</html>
