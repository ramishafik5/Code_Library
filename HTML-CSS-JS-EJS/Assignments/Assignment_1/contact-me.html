<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Page</title>
    <!-- full-size monitor style sheet-->
    <link href="laptop.css" rel="stylesheet" type="text/css" media="only screen and (min-width:960px)">
    <!-- tablet style sheet-->
    <link href="tablet.css" rel="stylesheet" type="text/css" media="only screen and (min-width:481px) and (max-width:960px)">
    <!-- phone style sheet-->
    <link href="mobile.css" rel="stylesheet" type="text/css" media="only screen and (max-width:480px)">
</head>
<body>
    <header>
         <h1>Contact Me</h1>
    </header>
    <div id="content">
        <div id="feedback">
            <form 
                action="mailto:rami.shafik@ontariotechu.net?subject=Feedback%20on%20website"
                enctype="text/plain"
                method="post"
                name="Form">
                <p>
                    <label for="name">What's your name :</label>
                    <input type="text" id="name" name="Fname" size="30" placeholder="Enter your first name" required>
                </p>
                <p>
                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" size="30" placeholder="Enter your email" required>
                </p>
                <p>
                    <label for="phone">Enter your Phone number :</label>
                    <input type="tel" id="phone" name="phone" size="30" placeholder="Enter your phone number" required>
                </p>
                <p>
                    <label for="message">Message :</label>
                    <textarea id="message" name="message"></textarea>
                </p>
                <br>
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
            </form>
        </div>
    </div>
    <footer>
        ©2025 by Rami Shafik
    </footer>
</body>
</html>
